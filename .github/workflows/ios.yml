name: Build IPA (Latest Xcode)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest   # macos-26 runner isn't publicly available yet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          set -e
          echo "Available Xcode versions:"
          ls /Applications | grep Xcode || true
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build & Archive
        run: |
          set -e

          SCHEME="monochrome"
          APP_NAME="monochrome"
          BUILD_DIR="$GITHUB_WORKSPACE/build"
          ARCHIVE_PATH="$BUILD_DIR/$APP_NAME.xcarchive"

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"

          echo "Archiving..."

          xcodebuild archive \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

      - name: Create IPA
        run: |
          set -e

          APP_NAME="monochrome"
          BUILD_DIR="$GITHUB_WORKSPACE/build"
          ARCHIVE_PATH="$BUILD_DIR/$APP_NAME.xcarchive"
          IPA_PATH="$GITHUB_WORKSPACE/$APP_NAME.ipa"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/$APP_NAME.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App not found at $APP_PATH"
            echo "Contents of archive Products:"
            find "$ARCHIVE_PATH/Products" -maxdepth 3 || true
            exit 1
          fi

          echo "Packaging IPA..."
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r -q "$IPA_PATH" Payload
          rm -rf Payload

          echo "✅ IPA: $(du -sh $IPA_PATH | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: monochrome.ipa
          path: monochrome.ipa
          retention-days: 14
