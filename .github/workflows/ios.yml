name: Build IPA (Latest Xcode)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Deduplicate MonochromeAPI additions
        run: python3 scripts/dedup_api.py

      - name: Build & Archive
        run: |
          set -e
          mkdir -p build
          xcodebuild archive \
            -project monochrome.xcodeproj \
            -scheme monochrome \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/monochrome.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

      - name: Create IPA
        run: |
          set -e
          APP_PATH="build/monochrome.xcarchive/Products/Applications/monochrome.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found. Archive contents:"
            find build/monochrome.xcarchive/Products -maxdepth 3 || true
            exit 1
          fi
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r -q monochrome.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -sh monochrome.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: monochrome.ipa
          path: monochrome.ipa
          retention-days: 14
