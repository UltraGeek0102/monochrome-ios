name: Build IPA (Latest Xcode)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15   # Xcode 16.x — stable, public runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # List available Xcode versions and pick the newest
          ls /Applications | grep Xcode
          XCODE=$(ls /Applications | grep "^Xcode" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE"
          xcodebuild -version

      - name: Deduplicate MonochromeAPI additions
        run: python3 scripts/dedup_api.py

      - name: Validate MonochromeAPI (catch bad chars before Xcode)
        run: |
          python3 - << 'PYEOF'
          import sys
          with open("monochrome/Services/MonochromeAPI.swift", "r", encoding="utf-8") as f:
              text = f.read()
          bad = [('“','“'), ('”','”'), ('‘','‘'), ('’','’')]
          found = [(i, c, name) for (c, name) in bad for i, ch in enumerate(text) if ch == c]
          if found:
              print(f"FAIL: curly quotes found at positions: {found[:5]}")
              sys.exit(1)
          print("OK: MonochromeAPI.swift has no curly quotes")
          PYEOF

      - name: Build & Archive
        run: |
          set -e
          mkdir -p build
          xcodebuild archive \
            -project monochrome.xcodeproj \
            -scheme monochrome \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/monochrome.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal" \
            -quiet

      - name: Create IPA
        run: |
          set -e
          APP_PATH="build/monochrome.xcarchive/Products/Applications/monochrome.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found. Archive contents:"
            find build/monochrome.xcarchive/Products -maxdepth 3 || true
            exit 1
          fi
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r -q monochrome.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -sh monochrome.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: monochrome.ipa
          path: monochrome.ipa
          retention-days: 14
